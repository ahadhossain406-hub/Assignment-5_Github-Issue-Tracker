<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-gray-100 space-y-8">
    <div class="flex justify-between items-center bg-white p-4 shadow">
        <div class="flex justify-center items-center gap-3">
            <div>
                <img src="assets/github-logo.png" alt="" class="w-12 h-12">
            </div>
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>

        </div>
        <div class="flex gap-2">
            <div class="relative w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                <input id="searchInput" class="border p-2 pl-10 rounded w-full" placeholder="Search issues">
            </div>

            <button onclick="searchIssue()" class="bg-blue-500 text-white px-4 py-2 rounded"><i
                    class="fa-solid fa-plus"></i>New Issue</button>

        </div>

    </div>

    <div class="flex gap-4 p-6 w-[80%] mx-auto bg-white shadow-md">

        <button id="allBtn" onclick="setActive('all'); loadIssues()"
            class="px-4 py-2 bg-purple-500 rounded text-white cursor-pointer">
            All
        </button>

        <button id="openBtn" onclick="setActive('open'); filterIssues('open')"
            class="px-4 py-2 bg-gray-200 rounded text-gray-500 cursor-pointer">
            Open
        </button>

        <button id="closedBtn" onclick="setActive('closed'); filterIssues('closed')"
            class="px-4 py-2 bg-gray-200 rounded text-gray-500 cursor-pointer">
            Closed
        </button>

    </div>

    <div class="flex justify-between items-center bg-white p-6 shadow-md w-[80%] mx-auto">
        <div class="flex gap-2">
            <img src="assets/Aperture.png" alt="" class="w-12">
            <div>
                <h2 class="text-xl font-semibold"><span id="issueCount">0</span> Issues</h2>
                <p class="text-gray-500 text-sm">Track and manage your project issues</p>
            </div>

        </div>

        <div class="flex gap-4 text-sm">

            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span>Open</p>

            <p class="flex items-center gap-2"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>Closed</p>

        </div>

    </div>

    <div id="issuesContainer" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 w-[80%] mx-auto "></div>

    <!-- <div id="issueModal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center">

        <div class="bg-white p-6 rounded w-[400px]">

            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

            <p id="modalDescription" class="text-gray-600"></p>

            <div class="mt-4 text-sm text-gray-500">

                <p id="modalAuthor"></p>
                <p id="modalCategory"></p>
                <p id="modalPriority"></p>

            </div>

            <button onclick="closeModal()" class="mt-4 bg-purple-500 text-white px-4 py-2 rounded">Close</button>

        </div>

    </div> -->

    <div id="issueModal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center">

        <div class="bg-white w-[500px] p-6 rounded-xl shadow-xl">

            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

            <div class="flex items-center gap-3 mb-3">

                <span class="bg-green-100 text-green-500 text-xs px-3 py-1 rounded-full">Opened</span>

                <span id="modalAuthor" class="text-sm text-gray-500"></span>

            </div>

            <div id="modalTags" class="flex gap-2 mb-3"></div>

            <p id="modalDescription" class="text-gray-600 mb-4"></p>

            <div class="flex justify-between bg-gray-100 p-3 rounded-lg">

                <div>
                    <p class="text-gray-400 text-sm">Assignee:</p>
                    <p id="modalCategory" class="font-semibold"></p>
                </div>

                <div>
                    <p class="text-gray-400 text-sm">Priority:</p>
                    <p id="modalPriority" class="font-semibold"></p>
                </div>

            </div>

            <div class="flex justify-end mt-4">
                <button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded">
                    Close
                </button>
            </div>

        </div>
    </div>
    <script src="homepage.js"></script>
</body>

</html>
